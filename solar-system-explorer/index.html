<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Explorer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css?v=6" />
  </head>
  <body>
    <!-- Fixed galaxy canvas — always behind everything -->
    <canvas id="galaxy-canvas"></canvas>

    <!-- Planet spheres — positioned over canvas by JS -->
    <div class="planet-spheres" id="planet-spheres"></div>

    <!-- Planet detail panel (slides in from right) -->
    <aside class="detail-panel" id="detail-panel" hidden>
      <button class="detail-close" id="detail-close">&times;</button>
      <div class="detail-header">
        <div class="detail-dot" id="detail-dot"></div>
        <div>
          <h3 class="detail-name" id="detail-name"></h3>
          <p class="detail-cn" id="detail-cn"></p>
          <p class="detail-tagline" id="detail-tagline"></p>
        </div>
      </div>
      <div class="detail-grid" id="detail-grid"></div>
      <p class="detail-source">
        Data:
        <a href="https://api.le-systeme-solaire.net" target="_blank"
          >Le Système Solaire API</a
        >
      </p>
    </aside>

    <script src="planets.js?v=6"></script>
    <script src="particle-sphere.js?v=6"></script>
    <script src="main.js?v=6"></script>
  </body>
</html>
